<script>
// FITUR 1: SCAM
function cekScam(){
  let t = document.getElementById('teks').value.toLowerCase();
  let kataScam = ['hadiah', 'gratis 100%', 'klik disini', 'admin', 'tf dulu', 'pajak'];
  let ketemu = kataScam.some(k => t.includes(k));
  document.getElementById('hasilScam').innerText = ketemu? 'SCAM WOY JANGAN KLIK ❌' : 'AMAN ✅';
}

// FITUR 2: PASSWORD
function cekPass(){
  let p = document.getElementById('pass').value;
  let skor = p.length + (/[A-Z]/.test(p)?5:0) + (/[0-9]/.test(p)?5:0) + (/[^A-Za-z0-9]/.test(p)?5:0);
  let teks = skor>20?'KUAT 🔥':skor>12?'SEDANG ⚠️': 'LEMAH BANGET ❌';
  document.getElementById('hasilPass').innerText = teks;
}

// FITUR 3: OSINT
function osint(){
  let u = document.getElementById('user').value;
  if(u=='') return;
  document.getElementById('hasilOsint').innerText = `Cek manual di: ig.com/${u} | github.com/${u} | tiktok.com/@${u}`;
}

// FITUR 4: EMAIL
function cekEmail(){
  let e = document.getElementById('email').value;
  let regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  let scamDomain = ['tempmail', 'mailinator', '10minutemail', 'guerrillamail'];
  let domain = e.split('@')[1];
  let ketemuScam = scamDomain.some(d => domain && domain.includes(d));

  if(!regex.test(e)){
    document.getElementById('hasilEmail').innerText = 'FORMAT SALAH ❌';
  } else if(ketemuScam){
    document.getElementById('hasilEmail').innerText = 'EMAIL TEMPORER/SCAM DETECTED ❌';
  } else {
    document.getElementById('hasilEmail').innerText = 'EMAIL VALID ✅';
  }
}
</script>
